name: Compile

on: 
  push:
    branches:
        - main

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Clear PKG_CONFIG_PATH
        shell: bash
        run: echo "PKG_CONFIG_PATH=" >> $GITHUB_ENV
    
      - name: Install Conan
        uses: conan-io/setup-conan@v1
        with:
          audit_token: ${{ secrets.MY_CONAN_AUDIT_TOKEN }}
          cache_packages: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorg-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libudev-dev \
            libx11-dev \
            libx11-xcb-dev \
            libfontenc-dev \
            libice-dev \
            libsm-dev \
            libxau-dev \
            libxaw7-dev
    
      - name: Install Conan dependencies with lockfile
        run: conan install . --lockfile=conan.lock --lockfile-partial --lockfile-out=conan.lock --build=missing 

      - name: Configure build
        run: cmake --preset conan-release

      - name: Compile
        run: cmake --build --preset conan-release
